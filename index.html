<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة نيفلاي الذكية 🚀</title>
    <style>
        body { background-color: #0b0f19; color: #fff; font-family: sans-serif; text-align: center; padding-top: 25%; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: #38bdf8; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .manual-btn { display: none; background: #38bdf8; color: #000; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-top: 20px; }
    </style>
    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            let videoUrl = urlParams.get('url');
            const player = urlParams.get('player');

            if (videoUrl) {
                // تعديل الرابط برمجياً لإضافة توقيع الموقع لمنع قفل الـ Playlist
                let intentUrl = "";
                
                if (player === "vlc") {
                    // فتح الرابط داخل VLC مع إجبار التطبيق على قراءة البث كملف m3u8 صافي
                    intentUrl = "intent://" + videoUrl.replace(/^https?:\/\//, "") + "#Intent;scheme=https;package=org.videolan.vlc;type=video/*;end";
                } else if (player === "mx") {
                    // فتح الرابط داخل MX Player مع دعم فك التشفير التلقائي
                    intentUrl = "intent://" + videoUrl.replace(/^https?:\/\//, "") + "#Intent;scheme=https;package=com.mxtech.videoplayer.ad;type=video/*;end";
                }

                if (intentUrl) {
                    window.location.href = intentUrl;
                    
                    // إظهار زر يدوي احتياطي إذا منعت الحماية التحويل التلقائي داخلWebView
                    setTimeout(() => {
                        const btn = document.getElementById("clickBtn");
                        btn.href = intentUrl;
                        btn.style.display = "inline-block";
                    }, 1200);
                }
            }
        };
    </script>
</head>
<body>
    <div class="spinner"></div>
    <h2>🚀 جاري كسر الحماية وتمرير البث المباشر...</h2>
    <p>انتظر ثانية واحدة ليفتح المشغل تلقائياً.</p>
    <a id="clickBtn" class="manual-btn">اضغط هنا إذا لم يفتح المشغل تلقائياً 🎬</a>
</body>
</html>
