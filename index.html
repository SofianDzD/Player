<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل نيفلاي السريع 🚀</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            text-align: center;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }
        .loader {
            border: 4px solid #1e293b;
            border-top: 4px solid #38bdf8;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn {
            background-color: #38bdf8;
            color: #0f172a;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
            display: none;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
    </style>
    <script>
        function launchPlayer() {
            const urlParams = new URLSearchParams(window.location.search);
            const videoUrl = urlParams.get('url');
            const player = urlParams.get('player');

            if (!videoUrl) return;

            let finalUrl = "";
            // صياغة روابط الأندرويد القياسية الصافية لفتح التطبيقات مباشرة
            if (player === "vlc") {
                finalUrl = "intent://" + videoUrl.replace(/^https?:\/\//, "") + "#Intent;scheme=https;package=org.videolan.vlc;end";
            } else if (player === "mx") {
                finalUrl = "intent://" + videoUrl.replace(/^https?:\/\//, "") + "#Intent;scheme=https;package=com.mxtech.videoplayer.ad;end";
            }

            if (finalUrl) {
                // محاولة التحويل التلقائي
                window.location.href = finalUrl;
                
                // إظهار زر التشغيل اليدوي إذا فشل النظام في التحويل التلقائي بسبب قيود المتصفح المدمج
                setTimeout(() => {
                    const btn = document.getElementById("manualBtn");
                    if (btn) {
                        btn.href = finalUrl;
                        btn.style.display = "inline-block";
                    }
                }, 1000);
            }
        }
        window.onload = launchPlayer;
    </script>
</head>
<body>
    <div class="loader"></div>
    <h2>🚀 جاري فتح المشغل الخارجي...</h2>
    <p style="color: #94a3b8; font-size: 0.95rem; max-width: 300px;">إذا لم يفتح تطبيق المشغل (VLC/MX) تلقائياً خلال ثوانٍ، اضغط على الزر أدناه:</p>
    
    <a id="manualBtn" class="btn" href="#">اضغط هنا لتشغيل الفيديو الفوري 🎬</a>
</body>
</html>
