<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مشغّل الأفلام</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      color: #fff;
    }
    video {
      width: 100%;
      max-height: 100vh;
      background: #000;
    }
    #error {
      display: none;
      text-align: center;
      padding: 20px;
      color: #ff6b6b;
    }
    #loading {
      position: absolute;
      text-align: center;
      color: #aaa;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="loading">⏳ جارٍ تحميل المشغّل...</div>
  <video id="player" controls playsinline></video>
  <div id="error">
    ❌ تعذّر تشغيل الفيلم.<br>
    <small>تحقق من الرابط أو جرّب سيرفراً آخر.</small>
  </div>

  <script>
    const params  = new URLSearchParams(location.search);
    const src     = params.get('url');
    const video   = document.getElementById('player');
    const loading = document.getElementById('loading');
    const errBox  = document.getElementById('error');

    // إبلاغ Telegram أن المشغّل جاهز
    if (window.Telegram?.WebApp) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
    }

    if (!src) {
      loading.style.display = 'none';
      errBox.style.display  = 'block';
    } else if (Hls.isSupported() && (src.includes('.m3u8') || !src.includes('.mp4'))) {
      // HLS stream
      const hls = new Hls({ enableWorker: false });
      hls.loadSource(decodeURIComponent(src));
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        loading.style.display = 'none';
        video.play().catch(() => {});
      });
      hls.on(Hls.Events.ERROR, (e, data) => {
        if (data.fatal) {
          loading.style.display = 'none';
          errBox.style.display  = 'block';
        }
      });
    } else {
      // رابط مباشر (MP4 أو غيره)
      video.src = decodeURIComponent(src);
      video.addEventListener('canplay', () => {
        loading.style.display = 'none';
        video.play().catch(() => {});
      });
      video.addEventListener('error', () => {
        loading.style.display = 'none';
        errBox.style.display  = 'block';
      });
    }
  </script>
</body>
</html>
