<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مشغّل الأفلام</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      color: #fff;
      overflow: hidden;
    }

    video {
      width: 100%;
      max-height: 100vh;
      background: #000;
    }

    video::cue {
      font-size: 1.1em;
      color: #ffffff;
      background-color: rgba(0, 0, 0, 0.75);
      font-family: Arial, sans-serif;
      line-height: 1.5;
    }

    #overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: #aaa;
      font-size: 14px;
      text-align: center;
      padding: 20px;
    }

    #overlay .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #333;
      border-top-color: #e50;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #error {
      display: none;
      position: absolute;
      text-align: center;
      color: #ff6b6b;
      padding: 20px;
      font-size: 15px;
      line-height: 1.7;
    }

    #sub-badge {
      display: none;
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,180,0,0.85);
      color: #fff;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="overlay">
    <div class="spinner"></div>
    <span>⏳ جارٍ تحميل المشغّل...</span>
  </div>

  <div id="error">
    ❌ تعذّر تشغيل الفيلم.<br>
    <small style="color:#aaa">جرّب سيرفراً آخر من البوت.</small>
  </div>

  <div id="sub-badge">🇸🇦 ترجمة عربية</div>

  <video id="player" controls playsinline crossorigin="anonymous"></video>

  <script>
    const params  = new URLSearchParams(location.search);
    const src     = params.get('url');
    const subSrc  = params.get('sub');
    const video   = document.getElementById('player');
    const overlay = document.getElementById('overlay');
    const errBox  = document.getElementById('error');
    const badge   = document.getElementById('sub-badge');

    if (window.Telegram?.WebApp) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
    }

    function showError() {
      overlay.style.display = 'none';
      errBox.style.display  = 'block';
    }

    function hideOverlay() {
      overlay.style.display = 'none';
    }

    /**
     * إضافة الترجمة بطريقة متوافقة مع WebView تيليجرام.
     *
     * المشكلة: عنصر <track> في بعض المتصفحات/WebViews يرفض:
     *   - Data URLs  (data:text/vtt;base64,...)
     *   - روابط CORS خارجية
     *
     * الحل: تحويل أي رابط (Data URL أو URL خارجي) إلى Blob URL محلي
     * عبر JavaScript — هذا يعمل في جميع المتصفحات الحديثة والـ WebViews.
     */
    async function attachSubtitle() {
      if (!subSrc) return;

      try {
        const decoded = decodeURIComponent(subSrc);
        let vttText;

        if (decoded.startsWith('data:')) {
          // Data URL — استخراج المحتوى مباشرةً بدون طلب شبكة
          const base64 = decoded.split(',')[1];
          vttText = decodeURIComponent(escape(atob(base64)));
        } else {
          // رابط خارجي — تحميله ثم تحويله إلى Blob
          const res = await fetch(decoded);
          vttText = await res.text();
        }

        // التأكد من وجود رأس WEBVTT
        if (!vttText.trimStart().startsWith('WEBVTT')) {
          vttText = 'WEBVTT\n\n' + vttText;
        }

        // إنشاء Blob URL محلي — يتجاوز قيود CORS وData URL تماماً
        const blob    = new Blob([vttText], { type: 'text/vtt' });
        const blobUrl = URL.createObjectURL(blob);

        // إزالة أي track سابق
        while (video.firstChild) video.removeChild(video.firstChild);

        const track   = document.createElement('track');
        track.kind    = 'subtitles';
        track.label   = 'العربية';
        track.srclang = 'ar';
        track.src     = blobUrl;
        track.default = true;
        video.appendChild(track);

        track.addEventListener('load', () => {
          badge.style.display = 'block';
          for (let t of video.textTracks) {
            if (t.language === 'ar') {
              t.mode = 'showing';
              break;
            }
          }
        });

        // fallback: تفعيل الترجمة بعد ثانية إذا لم يُطلق حدث load
        setTimeout(() => {
          for (let t of video.textTracks) {
            if (t.language === 'ar' && t.mode !== 'showing') {
              t.mode = 'showing';
              badge.style.display = 'block';
            }
          }
        }, 1000);

      } catch (e) {
        console.warn('Subtitle attach failed:', e);
      }
    }

    if (!src) {
      showError();
    } else if (Hls.isSupported() && !src.includes('.mp4')) {
      const hls = new Hls({ enableWorker: false });
      hls.loadSource(decodeURIComponent(src));
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        hideOverlay();
        attachSubtitle();
        video.play().catch(() => {});
      });
      hls.on(Hls.Events.ERROR, (_, data) => {
        if (data.fatal) showError();
      });
    } else {
      video.src = decodeURIComponent(src);
      video.addEventListener('canplay', () => {
        hideOverlay();
        attachSubtitle();
        video.play().catch(() => {});
      });
      video.addEventListener('error', showError);
    }
  </script>
</body>
</html>
