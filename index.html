<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>مشغّل الأفلام</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    #container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    /* ترجمة واضحة وكبيرة */
    video::cue {
      font-size: clamp(14px, 3.5vw, 22px);
      color: #fff;
      background: rgba(0,0,0,0.78);
      font-family: 'Segoe UI', Arial, sans-serif;
      line-height: 1.6;
      text-shadow: 1px 1px 2px #000;
    }

    /* شاشة التحميل */
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: #000;
      z-index: 20;
    }
    #overlay .spinner {
      width: 44px; height: 44px;
      border: 4px solid #333;
      border-top-color: #f80;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    #overlay span { color: #aaa; font-size: 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* شاشة الخطأ */
    #error {
      display: none;
      position: absolute;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #000;
      z-index: 20;
      text-align: center;
      padding: 24px;
    }
    #error .icon { font-size: 42px; }
    #error .msg  { color: #ff6b6b; font-size: 15px; line-height: 1.7; }
    #error .hint { color: #666; font-size: 12px; }

    /* شارة الترجمة */
    #sub-badge {
      display: none;
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0, 160, 60, 0.88);
      color: #fff;
      font-size: 11px;
      font-weight: bold;
      padding: 4px 12px;
      border-radius: 20px;
      z-index: 15;
      pointer-events: none;
      backdrop-filter: blur(4px);
    }

    /* شارة حالة الترجمة عند الفشل */
    #sub-warn {
      display: none;
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(180, 80, 0, 0.88);
      color: #fff;
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 20px;
      z-index: 15;
      pointer-events: none;
    }
  </style>
</head>
<body>
<div id="container">

  <div id="overlay">
    <div class="spinner"></div>
    <span id="overlay-text">⏳ جارٍ تحميل المشغّل...</span>
  </div>

  <div id="error">
    <div class="icon">⚠️</div>
    <div class="msg">تعذّر تشغيل هذا المصدر.</div>
    <div class="hint">جرّب سيرفراً آخر من البوت.</div>
  </div>

  <div id="sub-badge">🇸🇦 ترجمة عربية</div>
  <div id="sub-warn">⚠️ بدون ترجمة</div>

  <video id="player" controls playsinline crossorigin="anonymous"></video>

</div>
<script>
  /* ─── استخراج المعاملات ─────────────────────────────────────── */
  const params = new URLSearchParams(location.search);
  const src    = params.get('url');
  const subSrc = params.get('sub');

  const video    = document.getElementById('player');
  const overlay  = document.getElementById('overlay');
  const overlayT = document.getElementById('overlay-text');
  const errBox   = document.getElementById('error');
  const badge    = document.getElementById('sub-badge');
  const warn     = document.getElementById('sub-warn');

  /* ─── Telegram WebApp ──────────────────────────────────────── */
  if (window.Telegram?.WebApp) {
    window.Telegram.WebApp.ready();
    window.Telegram.WebApp.expand();
  }

  /* ─── مساعدات ──────────────────────────────────────────────── */
  const hideOverlay = () => overlay.style.display = 'none';
  const showError   = () => {
    overlay.style.display = 'none';
    errBox.style.display  = 'flex';
  };

  /**
   * إضافة الترجمة — الطريقة الوحيدة الموثوقة في WebView تيليجرام:
   *
   * 1. إذا كان الرابط Data URL (base64) → نفكّه مباشرةً في الذاكرة.
   * 2. إذا كان رابطاً خارجياً → نُحمّله عبر fetch().
   * 3. في كلا الحالتين → ننشئ Blob URL محلياً ونُسنده لـ <track>.
   *
   * Blob URL يتجاوز قيود CORS وData URL في <track> تماماً.
   */
  async function attachSubtitle() {
    if (!subSrc) { warn.style.display = 'block'; return; }

    try {
      const decoded = decodeURIComponent(subSrc);
      let vttText;

      if (decoded.startsWith('data:')) {
        /* Data URL — فكّ base64 في المتصفح */
        const comma  = decoded.indexOf(',');
        const b64    = decoded.slice(comma + 1);
        const binary = atob(b64);
        const bytes  = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        vttText = new TextDecoder('utf-8').decode(bytes);
      } else {
        /* رابط خارجي */
        const res = await fetch(decoded, { mode: 'cors' });
        if (!res.ok) throw new Error(`fetch ${res.status}`);
        vttText = await res.text();
      }

      /* ضمان وجود رأس WEBVTT */
      if (!vttText.trimStart().startsWith('WEBVTT')) {
        vttText = 'WEBVTT\n\n' + vttText;
      }

      /* إنشاء Blob URL — يعمل في جميع المتصفحات والـ WebViews */
      const blob    = new Blob([vttText], { type: 'text/vtt; charset=utf-8' });
      const blobUrl = URL.createObjectURL(blob);

      /* إزالة أي track قديم */
      [...video.querySelectorAll('track')].forEach(t => t.remove());

      const track   = document.createElement('track');
      track.kind    = 'subtitles';
      track.label   = 'العربية';
      track.srclang = 'ar';
      track.src     = blobUrl;
      track.default = true;
      video.appendChild(track);

      const activateTrack = () => {
        for (const t of video.textTracks) {
          if (t.language === 'ar') {
            t.mode = 'showing';
            badge.style.display = 'block';
            return true;
          }
        }
        return false;
      };

      track.addEventListener('load', activateTrack);

      /* fallback بعد ثانية واحدة */
      setTimeout(() => {
        if (!activateTrack()) warn.style.display = 'block';
      }, 1200);

    } catch (e) {
      console.warn('Subtitle error:', e);
      warn.style.display = 'block';
    }
  }

  /* ─── تشغيل الفيلم ─────────────────────────────────────────── */
  if (!src) {
    showError();
  } else {
    const decodedSrc = decodeURIComponent(src);
    const isHls = !decodedSrc.includes('.mp4') && !decodedSrc.includes('.webm');

    if (isHls && Hls.isSupported()) {
      const hls = new Hls({
        enableWorker:       false,
        maxBufferLength:    30,
        maxMaxBufferLength: 60,
      });
      hls.loadSource(decodedSrc);
      hls.attachMedia(video);

      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        hideOverlay();
        attachSubtitle();
        video.play().catch(() => {});
      });

      hls.on(Hls.Events.ERROR, (_, data) => {
        if (data.fatal) {
          if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
            hls.startLoad();
          } else {
            showError();
          }
        }
      });

    } else if (isHls && video.canPlayType('application/vnd.apple.mpegurl')) {
      /* Safari / iOS native HLS */
      video.src = decodedSrc;
      video.addEventListener('loadedmetadata', () => {
        hideOverlay();
        attachSubtitle();
        video.play().catch(() => {});
      });
      video.addEventListener('error', showError);

    } else {
      /* MP4 / رابط مباشر */
      video.src = decodedSrc;
      video.addEventListener('canplay', () => {
        hideOverlay();
        attachSubtitle();
        video.play().catch(() => {});
      });
      video.addEventListener('error', showError);
    }
  }
</script>
</body>
</html>
